<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan OOP Dart</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#ffe6f2;
    color:#4a0d33;
}

/* HEADER */
header{
    background:#ffb3d9;
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
}

header p{
    margin:5px 0;
    font-weight:bold;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:1000px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

/* ===== POPUP STYLE ===== */

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:0.3s;
}

.overlay.active{
    opacity:1;
    visibility:visible;
}

.popup{
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
    transform:scale(0.7);
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.overlay.active .popup{
    transform:scale(1);
}

.popup h2{
    color:#cc0066;
    margin-top:0;
}

.popup button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#ff66b2;
    color:white;
    cursor:pointer;
}

.popup button:hover{
    background:#e60073;
}
</style>
</head>

<body>

<!-- POPUP -->
<div class="overlay" id="popupOverlay">
    <div class="popup">
        <h2>Selamat Datang 🌸</h2>
        <p>
        Laporan OOP Dart<br>
        Nama: Nabilah Cahya Suci<br>
        NIM: 251410018<br>
        Kelas: SI2A
        </p>
        <button onclick="closePopup()">Tutup</button>
    </div>
</div>

<header>
    <h1>Laporan OOP Dart</h1>
    <p>Nama: Nabilah Cahya Suci</p>
    <p>NIM: 251410018</p>
    <p>Kelas: SI2A</p>
</header>

<div class="container">
    <h2>Isi Laporan</h2>
    <p>Tambahkan materi OOP dan DartPad kamu di sini.</p>
</div>

<script>
window.onload = function() {
    document.getElementById("popupOverlay").classList.add("active");
};

function closePopup(){
    document.getElementById("popupOverlay").classList.remove("active");
}

// Tutup popup jika klik di luar kotak
document.getElementById("popupOverlay").addEventListener("click", function(e){
    if(e.target === this){
        closePopup();
    }
});
</script>

</body>
</html>
