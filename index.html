<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan OOP Dart</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#ffe6f2;
    color:#4a0d33;
}

header{
    background:#ffb3d9;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1000px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

h2{
    color:#cc0066;
    margin-top:40px;
}

iframe{
    width:100%;
    height:400px;
    border:1px solid #ff99cc;
    border-radius:6px;
    margin-top:15px;
}

/* ===== TOMBOL ===== */
.popup-btn{
    background:#ff66b3;
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:6px;
    cursor:pointer;
    margin-top:15px;
}

.popup-btn:hover{
    background:#cc0066;
}

/* ===== POPUP ===== */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:25px;
    border-radius:10px;
    width:90%;
    max-width:400px;
    text-align:center;
    position:relative;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:20px;
    cursor:pointer;
    color:#cc0066;
}
</style>
</head>

<body>

<header>
    <h1>Laporan OOP Dart</h1>
    <p>Nama: Nabilah Cahya Suci</p>
    <p>NIM: 251410018</p>
    <p>Kelas: SI2A</p>

    <!-- TOMBOL UNTUK MEMUNCULKAN POPUP -->
    <button class="popup-btn" onclick="bukaPopup()">Lihat Info</button>
</header>

<div class="container">
<h2>Pengertian OOP</h2>
<p>
Object Oriented Programming (OOP) adalah pendekatan dalam pemrograman 
yang mengorganisasi kode ke dalam bentuk objek.
</p>
</div>

<!-- ===== POPUP ===== -->
<div id="popup" class="popup">
    <div class="popup-content">
        <span class="close" onclick="tutupPopup()">&times;</span>
        <h3>Informasi Website</h3>
        <p>Ini adalah website Laporan OOP Dart oleh Nabilah Cahya Suci.</p>
    </div>
</div>

<script>
function bukaPopup(){
    document.getElementById("popup").style.display="flex";
}

function tutupPopup(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
