<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan OOP Dart</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#ffe6f2;
    color:#4a0d33;
}

header{
    background:#ffb3d9;
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
}

header p{
    margin:5px 0 0 0;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:1000px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

h2{
    color:#cc0066;
    margin-top:40px;
}

iframe{
    width:100%;
    height:400px;
    border:1px solid #ff99cc;
    border-radius:6px;
    margin-top:15px;
}

footer{
    text-align:center;
    padding:15px;
    background:#ffb3d9;
    margin-top:40px;
}

/* ===== BUTTON ===== */
.btn-popup{
    background:#ff66b3;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
    margin-top:20px;
}

.btn-popup:hover{
    background:#cc0066;
}

/* ===== POPUP ===== */
.modal{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.modal-content{
    background:white;
    width:90%;
    max-width:400px;
    margin:10% auto;
    padding:25px;
    border-radius:10px;
    position:relative;
    text-align:center;
}

.close{
    position:absolute;
    right:15px;
    top:10px;
    font-size:22px;
    cursor:pointer;
    color:#cc0066;
}
</style>
</head>

<body>

<header>
    <h1>Laporan OOP Dart</h1>
    <p>Nama: Nabilah Cahya Suci</p>
    <p>NIM: 251410018</p>
    <p>Kelas: SI2A</p>
</header>

<div class="container">

<h2>Pengertian OOP</h2>
<p>
Object Oriented Programming (OOP) adalah pendekatan dalam pemrograman yang 
mengorganisasi kode ke dalam bentuk objek.
</p>

<!-- TOMBOL POPUP -->
<button class="btn-popup" onclick="openModal()">Klik Untuk Info Tambahan</button>

</div>

<!-- ===== POPUP ===== -->
<div id="myModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3>Informasi Tambahan</h3>
    <p>Website ini dibuat untuk memenuhi tugas Laporan OOP Dart.</p>
  </div>
</div>

<footer></footer>

<script>
function openModal(){
    document.getElementById("myModal").style.display="block";
}

function closeModal(){
    document.getElementById("myModal").style.display="none";
}

window.onclick = function(event){
    var modal = document.getElementById("myModal");
    if(event.target == modal){
        modal.style.display="none";
    }
}
</script>

</body>
</html>
